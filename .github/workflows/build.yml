name: Build and Release SUFFERING Server

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental || false }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
            output: SUFFERING-Server-windows-x64.exe
            use_mingw: true

          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            output: SUFFERING-Server-linux-x64

          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            output: SUFFERING-Server-linux-arm64
            use_arm_compiler: true

          - os: macos-latest
            goos: darwin
            goarch: amd64
            output: SUFFERING-Server-macos-intel
            experimental: true

          - os: macos-latest
            goos: darwin
            goarch: arm64
            output: SUFFERING-Server-macos-silicon
            experimental: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Install Windows x64 Cross-Compiler
        if: matrix.use_mingw == true
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Install Linux ARM64 Cross-Compiler
        if: matrix.use_arm_compiler == true
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: >-
            ${{ matrix.use_mingw == true && 'x86_64-w64-mingw32-gcc' ||
                matrix.use_arm_compiler == true && 'aarch64-linux-gnu-gcc' ||
                'gcc' }}
        run: |
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o dist/${{ matrix.output }}

      - name: Static-link C++ runtime for Windows build
        if: matrix.use_mingw == true
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: x86_64-w64-mingw32-gcc
          CGO_LDFLAGS: -static-libgcc -static-libstdc++
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o dist/${{ matrix.output }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(cat version.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir release
          find artifacts -type f -exec cp {} release/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
